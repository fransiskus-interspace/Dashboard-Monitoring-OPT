<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard Monitoring OPTT</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/2782/2782058.png" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 80%;
      height: 80%;
      background-color: #eee;
      overflow: hidden; /* Mencegah scroll ganda */
    }

    .iframe-container {
      width: 80%;
      height: 80dvh; /* Menggunakan dvh agar pas di mobile browser */
      overflow: hidden;
    }

    iframe {
      display: block;
      width: 80%;
      height: 80%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/a/macros/interspace.co.id/s/AKfycbxlf8Gp-Mq5NCGy8BWa0LcA6wnCqdwcQasZNJfzDDji8oUGkGfGfqjtn-Bk5cI-vUBK/exec"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>
</body>
</html>
