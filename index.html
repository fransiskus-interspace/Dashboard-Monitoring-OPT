<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
  <title>Dashboard Monitoring OPTT</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/128/2782/2782058.png" />
  <style>
    /* Reset margin dan padding, serta atur tinggi penuh */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;         /* gunakan min-height agar bisa berkembang */
      background-color: #eee;
    }

    /* Container iframe mengisi seluruh area viewport */
    .iframe-container {
      width: 100%;
      height: 100vh;            /* fallback untuk browser lama */
      height: 100dvh;           /* dynamic viewport height untuk mobile modern */
      overflow: auto;           /* mengizinkan scroll jika konten melebihi container */
    }

    /* iframe diatur full dan tidak ada border */
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      min-height: 100%;         /* memastikan tinggi minimal penuh */
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/a/macros/interspace.co.id/s/AKfycbxlf8Gp-Mq5NCGy8BWa0LcA6wnCqdwcQasZNJfzDDji8oUGkGfGfqjtn-Bk5cI-vUBK/exec"
      scrolling="yes"
      allowfullscreen="true"
      webkitallowfullscreen="true"
      mozallowfullscreen="true"
      allow="fullscreen; camera; microphone; display-capture; geolocation;">
    </iframe>
  </div>
</body>
</html>
